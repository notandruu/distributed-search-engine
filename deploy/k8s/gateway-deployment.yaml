apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: distributed-search
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2112"
    spec:
      containers:
        - name: gateway
          image: dse-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 2112
              name: metrics
          env:
            - name: SHARD_ADDRS
              value: "shard-0.distributed-search:50052,shard-1.distributed-search:50052,shard-2.distributed-search:50052,shard-3.distributed-search:50052"
            - name: REDIS_ADDR
              value: "redis.distributed-search:6379"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.distributed-search:4317"
            - name: MAX_CONCURRENT_SEARCHES
              value: "256"
            - name: SEARCH_TIMEOUT_MS
              value: "100"
            - name: SHARD_TIMEOUT_MS
              value: "75"
          readinessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50051
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
