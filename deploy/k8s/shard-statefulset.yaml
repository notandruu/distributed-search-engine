apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: shard
  namespace: distributed-search
spec:
  serviceName: shard
  replicas: 4
  selector:
    matchLabels:
      app: shard
  template:
    metadata:
      labels:
        app: shard
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2113"
    spec:
      containers:
        - name: shard
          image: dse-shard:latest
          imagePullPolicy: IfNotPresent
          # shard-id is extracted from the pod ordinal via the MY_POD_NAME env var
          command: ["/shard", "--addr=:50052"]
          env:
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "otel-collector.distributed-search:4317"
            - name: METRICS_ADDR
              value: ":2113"
          ports:
            - containerPort: 50052
              name: grpc
            - containerPort: 2113
              name: metrics
          readinessProbe:
            grpc:
              port: 50052
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 50052
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: index-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: index-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
