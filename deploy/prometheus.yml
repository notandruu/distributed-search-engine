global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:2112"]
    metrics_path: /metrics

  - job_name: shard-0
    static_configs:
      - targets: ["shard-0:2113"]

  - job_name: shard-1
    static_configs:
      - targets: ["shard-1:2113"]

  - job_name: shard-2
    static_configs:
      - targets: ["shard-2:2113"]

  - job_name: shard-3
    static_configs:
      - targets: ["shard-3:2113"]

  # OTel Collector exports Prometheus metrics from OTLP pipelines
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]
