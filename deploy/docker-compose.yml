version: "3.9"

x-shard-common: &shard-common
  image: dse-shard:latest
  build:
    context: ..
    dockerfile: deploy/Dockerfile.shard
  restart: unless-stopped
  depends_on:
    - otel-collector

services:
  gateway:
    image: dse-gateway:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    ports:
      - "50051:50051"
      - "2112:2112"
    environment:
      - SHARD_ADDRS=shard-0:50052,shard-1:50052,shard-2:50052,shard-3:50052
      - REDIS_ADDR=redis:6379
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - MAX_CONCURRENT_SEARCHES=256
      - SEARCH_TIMEOUT_MS=100
      - SHARD_TIMEOUT_MS=75
    depends_on:
      - redis
      - shard-0
      - shard-1
      - shard-2
      - shard-3
      - otel-collector
    restart: unless-stopped

  shard-0:
    <<: *shard-common
    command: ["--addr=:50052", "--shard-id=0"]
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    ports:
      - "50062:50052"
      - "2120:2113"

  shard-1:
    <<: *shard-common
    command: ["--addr=:50052", "--shard-id=1"]
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    ports:
      - "50063:50052"
      - "2121:2113"

  shard-2:
    <<: *shard-common
    command: ["--addr=:50052", "--shard-id=2"]
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    ports:
      - "50064:50052"
      - "2122:2113"

  shard-3:
    <<: *shard-common
    command: ["--addr=:50052", "--shard-id=3"]
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    ports:
      - "50065:50052"
      - "2123:2113"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.97.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.56
    ports:
      - "16686:16686"
      - "14250:14250"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

volumes:
  grafana-data:
